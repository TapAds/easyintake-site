<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Easy Intake</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #0b0f14, #111827);
  color: #fff;
}

.container {
  max-width: 820px;
  margin: auto;
  padding: 28px 16px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 24px;
  font-weight: 700;
}

.logo span {
  color: #00d4ff;
}

.flags {
  font-size: 18px;
}

h1 {
  font-size: 30px;
  margin: 18px 0 8px;
}

.sub {
  font-size: 15px;
  color: #9aa4af;
}

.features {
  margin-top: 16px;
}

.feature {
  background: #11161d;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 6px;
}

iframe {
  width: 100%;
  height: 500px;
  border: none;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">Easy<span>Intake</span></div>
    <div class="flags">🇺🇸 🇲🇽</div>
  </div>

  <h1>Multilingual Intake. Zero Friction.</h1>

  <div class="sub">
    Capture and structure customer data from calls, forms, or chat — in any language.
  </div>

  <div class="features">
    <div class="feature">Real-time transcription → structured data</div>
    <div class="feature">Auto-fill CRM fields, PDFs, applications</div>
    <div class="feature">Works across phone, chat, and web</div>
  </div>

  <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSewk721el3Blm8a0Ik5Pdrx4ahTBXfq8zA_AF_ZDWI1w__-7w/viewform?embedded=true"></iframe>

</div>

</body>
</html>
